.cert-seal{width:64px;height:64px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:370px}
.chat-msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px}
.chat-msg{max-width:78%;padding:9px 13px;border-radius:11px;font-size:12.5px;line-height:1.6}
.chat-msg.user{background:var(--grad);color:#fff;align-self:flex-end;border-radius:11px 11px 3px 11px}
.chat-msg.bot{background:rgba(28,36,56,.8);color:var(--txt);align-self:flex-start;border-radius:11px 11px 11px 3px}
.chat-in{display:flex;gap:7px;padding:11px 13px;border-top:1px solid var(--bdr)}
.chat-in input{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;color:var(--txt);font-family:inherit;font-size:12.5px;outline:none}
.chat-in input:focus{border-color:var(--acc)}

/* BAR CHART */
.cbars{display:flex;align-items:flex-end;gap:5px;height:78px}
.cbar{flex:1;border-radius:4px 4px 0 0;background:var(--grad);opacity:.55;transition:.2s;cursor:pointer;min-height:3px}
.cbar:hover{opacity:1}

/* PLAN CARDS */
.plc{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:18px;transition:.16s}
.plc.ft{border-color:var(--acc);background:rgba(91,124,250,.05)}
.plprice{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin:7px 0}
.plf{font-size:11.5px;color:var(--lt);margin:3px 0;display:flex;align-items:center;gap:5px}

/* TOGGLE */
.tog{width:33px;height:18px;border-radius:10px;position:relative;transition:.16s;flex-shrink:0;cursor:pointer}
.tog.on{background:var(--grn)}.tog.off{background:var(--bdr)}
.tog::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;transition:.16s}
.tog.on::after{left:17px}.tog.off::after{left:3px}
.togrow{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--lt);cursor:pointer;padding:4px 0}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:10px;font-weight:600;font-size:12.5px;z-index:999;animation:pop .22s ease;display:flex;align-items:center;gap:7px;border:1px solid}
.t-ok{background:rgba(16,185,129,.13);border-color:rgba(16,185,129,.28);color:var(--grn)}
.t-info{background:rgba(91,124,250,.13);border-color:rgba(91,124,250,.28);color:var(--acc)}

/* MISC */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.ptl{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.1}
.psu{color:var(--mut);font-size:12px;margin-top:3px}
.empty{text-align:center;padding:42px;color:var(--mut)}
.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:3px}
.tab{padding:5px 12px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--mut);border:none;background:none;font-family:inherit;transition:.14s;white-space:nowrap}
.tab.on{background:var(--grad);color:#fff}
.pbar-wrap{height:4px;background:var(--bdr);border-radius:3px;overflow:hidden;margin:5px 0}
.pbar-fill{height:100%;border-radius:3px;background:var(--grad);transition:width .3s}
`;

/* ─── HELPERS ────────────────────────────────────────────────── */
function TBadge({ type }) {
  const m = { text:["📄","bb","Texto"], voice:["🎙️","bp","Voz"], video:["🎬","bo","Video"] };
  const [ic, cl, lb] = m[type] || m.text;
  return <span className={`bd ${cl}`}>{ic} {lb}</span>;
}
function SBadge({ status }) {
  return <span className={`bd ${status === "published" ? "bg" : "bo"}`}>{status === "published" ? "✓ Publicado" : "✎ Borrador"}</span>;
}
function parseSteps(txt) {
  const steps = [];
  const rx = /PASO\s*(\d+)[:\-]\s*([^\n]+)\n([\s\S]*?)(?=PASO\s*\d|TIEMPO|$)/gi;
  let m;
  while ((m = rx.exec(txt || "")) !== null) {
    steps.push({ num: m[1], title: m[2].trim(), body: m[3].replace(/\n+$/, "").trim() });
  }
  return steps;
}
function fallback(topic, dept) {
  return `PASO 1: Preparación inicial\nVerificá tus credenciales y accedé al sistema correspondiente.\n\nPASO 2: Acceso al módulo\nAbrí la sección requerida desde el menú principal.\n\nPASO 3: Ingreso de datos\nCompletá todos los campos requeridos con la información correcta.\n\nPASO 4: Procesamiento\nEjecutá la acción principal sin saltear ningún paso.\n\nPASO 5: Verificación y cierre\nConfirmá el resultado y guardá según el protocolo de ${dept}.\n\nTIEMPO: 8 minutos`;
}

/* ─── MAIN APP ───────────────────────────────────────────────── */
export default function App() {
  const [sess, setSess]     = useState(null);
  const [users, setUsers]   = useState(INIT_USERS);
  const [tuts, setTuts]     = useState(INIT_TUTS);
  const [compls, setCompls] = useState(INIT_COMPLS);
  const [toasts, setToasts] = useState([]);

  const toast = (msg, type = "ok") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2800);
  };

  const ctx = { users, setUsers, tuts, setTuts, compls, setCompls, toast };

  if (!sess) {
    return (
      <>
        <style>{CSS}</style>
        <Auth
          users={users}
          onLogin={u => setSess({ user: u, role: u.role })}
          onRegister={d => {
            const nu = { id: Date.now(), ...d, role:"user", plan:"free", avatar:d.name.slice(0,2).toUpperCase(), joined:new Date().toISOString().slice(0,10), workspace:"" };
            setUsers(p => [...p, nu]);
            setSess({ user: nu, role: "user" });
          }}
        />
        <Toasts toasts={toasts}/>
      </>
    );
  }

  return (
    <>
      <style>{CSS}</style>
      {sess.role === "owner"
        ? <AdminApp {...ctx} logout={() => setSess(null)}/>
        : <UserApp  {...ctx} sess={sess} logout={() => setSess(null)}/>
      }
      <Toasts toasts={toasts}/>
    </>
  );
}

function Toasts({ toasts }) {
  return (
    <div style={{ position:"fixed", bottom:18, right:18, zIndex:1000, display:"flex", flexDirection:"column", gap:7 }}>
      {toasts.map(t => (
        <div key={t.id} className={`toast t-${t.type}`}>✓ {t.msg}</div>
      ))}
    </div>
  );
}

/* ─── AUTH ───────────────────────────────────────────────────── */
function Auth({ users, onLogin, onRegister }) {
  const [tab, setTab]   = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [pass, setPass]   = useState("");
  const [err, setErr]     = useState("");

  const doLogin = () => {
    if (email === OWNER.email && pass === OWNER.password) { onLogin(OWNER); return; }
    const u = users.find(u => u.email === email && u.password === pass);
    if (u) { onLogin(u); return; }
    setErr("Credenciales incorrectas");
  };

  const doReg = () => {
    if (!name || !email || !pass) { setErr("Completá todos los campos"); return; }
    if (users.find(u => u.email === email)) { setErr("Email ya registrado"); return; }
    onRegister({ name, email, password: pass });
  };

  return (
    <div className="auth-bg">
      <div className="orb" style={{ width:500, height:500, background:"#5B7CFA", top:-150, right:-80, opacity:.07 }}/>
      <div className="orb" style={{ width:380, height:380, background:"#8B5CF6", bottom:-100, left:-80, opacity:.07 }}/>
      <div className="auth-box">
        <div className="auth-logo">
          <div className="auth-mark">T</div>
          <span className="auth-brand">TutorAI</span>
        </div>
        <div className="auth-h">{tab === "login" ? "Bienvenido 👋" : "Crear cuenta gratis"}</div>
        <div className="auth-s">{tab === "login" ? "Entrá a tu plataforma de capacitación" : "Generá tutoriales con IA desde hoy"}</div>
        <div className="atabs">
          <button className={`atab${tab === "login" ? " on" : ""}`} onClick={() => { setTab("login"); setErr(""); }}>Iniciar Sesión</button>
          <button className={`atab${tab === "register" ? " on" : ""}`} onClick={() => { setTab("register"); setErr(""); }}>Registrarse</button>
        </div>
        {tab === "login" && (
          <div className="hints">
            🔑 <strong>Admin:</strong> admin@tutorai.com / admin123<br/>
            👤 <strong>Pro:</strong> carlos@demo.com / 123 &nbsp;·&nbsp; <strong>Business:</strong> juan@demo.com / 123<br/>
            👤 <strong>Free:</strong> maria@demo.com / 123
          </div>
        )}
        {tab === "register" && (
          <div className="fg"><label>Nombre completo</label><input placeholder="Tu nombre..." value={name} onChange={e => setName(e.target.value)}/></div>
        )}
        <div className="fg"><label>Email</label><input type="email" placeholder="tu@empresa.com" value={email} onChange={e => setEmail(e.target.value)}/></div>
        <div className="fg"><label>Contraseña</label><input type="password" placeholder="••••••••" value={pass} onChange={e => setPass(e.target.value)}/></div>
        {err && <div className="err">⚠ {err}</div>}
        <button className="btn btn-p btn-full" onClick={tab === "login" ? doLogin : doReg}>
          {tab === "login" ? "Entrar a TutorAI →" : "Crear cuenta gratis →"}
        </button>
        <div className="dvd">o continuá con</div>
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn btn-s btn-full">🔵 Google</button>
          <button className="btn btn-s btn-full">💼 Microsoft</button>
        </div>
      </div>
    </div>
  );
}

function UserApp({ sess, users, tuts, setTuts, compls, setCompls, toast, logout }) {
  const [page, setPage]       = useState("home");
  const [showNew, setShowNew] = useState(false);
  const [srch, setSrch]       = useState("");
  const [modal, setModal]     = useState(null); // {tut, mode: "view"|"quiz"|"cert"|"chat"}

  const u        = sess.user;
  const plan     = PLANS[u.plan] || PLANS.free;
  const pc       = { free:"#6B7A99", pro:"#4F6EF7", business:"#10B981" };
  const myTuts   = tuts.filter(t => t.userId === u.id);
  const assigned = tuts.filter(t => t.assignedTo?.includes(u.id));
  const favTuts  = myTuts.filter(t => t.favorite);
  const myCompls = compls.filter(c => c.userId === u.id);

  const toggleFav = id => setTuts(p => p.map(t => t.id===id ? {...t,favorite:!t.favorite} : t));
  const delTut    = id => { setTuts(p => p.filter(t => t.id!==id)); toast("Tutorial eliminado"); };

  const openModal = (tut, mode="view") => setModal({ tut, mode });
  const closeModal = () => setModal(null);

  const pendingCount = assigned.filter(t => !myCompls.find(c => c.tutId===t.id)).length;
  const certCount    = myCompls.filter(c => c.certified).length;

  const groups = [
    { g:"Mi Espacio", items:[
      { id:"home",      icon:"dash",     label:"Inicio" },
      { id:"my",        icon:"tuts",     label:"Mis Tutoriales", badge:myTuts.length },
      { id:"assigned",  icon:"assign",   label:"Asignados",      badge:pendingCount||undefined, red:pendingCount>0 },
      { id:"favs",      icon:"star",     label:"Favoritos",      badge:favTuts.length||undefined },
    ]},
    { g:"Crear", items:[
      { id:"templates", icon:"template", label:"Templates" },
    ]},
    { g:"Explorar", items:[
      { id:"explore",   icon:"search",   label:"Explorar públicos" },
    ]},
    { g:"Cuenta", items:[
      { id:"certs",     icon:"cert",     label:"Mis Certificados", badge:certCount||undefined },
      { id:"plan",      icon:"crown",    label:"Mi Plan" },
    ]},
  ];

  const filteredMy  = myTuts.filter(t => !srch || t.title.toLowerCase().includes(srch.toLowerCase()));
  const filteredPub = tuts.filter(t => t.userId!==u.id && t.status==="published" && (!srch||t.title.toLowerCase().includes(srch.toLowerCase())));

  return (
    <div className="shell">
      <Sidebar user={u} groups={groups} page={page} setPage={setPage} logout={logout} planLabel={plan.label} planColor={pc[u.plan]}/>
      <div className="main">
        <div className="topbar">
          <div className="sbar"><Ic n="search" s={13}/><input placeholder="Buscar tutoriales..." value={srch} onChange={e => setSrch(e.target.value)}/></div>
          <div style={{ marginLeft:"auto" }}><div className="ibtn"><Ic n="bell" s={14}/></div></div>
        </div>
        <div className="page">
          {page==="home"      && <UHome u={u} plan={plan} pc={pc} myTuts={myTuts} assigned={assigned} myCompls={myCompls} onNew={()=>setShowNew(true)} onView={openModal} setPage={setPage}/>}
          {page==="my"        && <UMy tuts={filteredMy} plan={plan} onFav={toggleFav} onDel={delTut} onView={openModal} onNew={()=>setShowNew(true)} toast={toast}/>}
          {page==="assigned"  && <UAssigned tuts={assigned} myCompls={myCompls} onView={openModal}/>}
          {page==="favs"      && <UFavs tuts={favTuts} onFav={toggleFav} onView={openModal}/>}
          {page==="templates" && <UTemplates toast={toast}/>}
          {page==="explore"   && <UExplore tuts={filteredPub} onView={openModal}/>}
          {page==="certs"     && <UCerts u={u} myCompls={myCompls} tuts={tuts}/>}
          {page==="plan"      && <UPlan u={u} plan={plan} pc={pc} myTuts={myTuts} setPage={setPage}/>}
        </div>
      </div>

      {showNew && (
        <NewTutModal
          plan={plan}
          allUsers={users.filter(x => x.id !== u.id)}
          onClose={() => setShowNew(false)}
          onSave={t => { setTuts(p => [{...t, userId:u.id, favorite:false}, ...p]); setShowNew(false); toast("¡Tutorial creado!"); }}
        />
      )}

      {modal && modal.mode==="view"  && <ViewModal tut={modal.tut} user={u} myCompls={myCompls} onClose={closeModal} onFav={toggleFav} onQuiz={()=>setModal({tut:modal.tut,mode:"quiz"})} onChat={()=>setModal({tut:modal.tut,mode:"chat"})} onCert={()=>setModal({tut:modal.tut,mode:"cert"})} toast={toast}/>}
      {modal && modal.mode==="quiz"  && <QuizModal tut={modal.tut} user={u} onClose={closeModal} onComplete={score=>{setCompls(p=>[...p,{userId:u.id,tutId:modal.tut.id,score,date:new Date().toISOString().slice(0,10),certified:modal.tut.certOn}]);setModal({tut:modal.tut,mode:"cert"});toast("Quiz completado! Score: "+score+"%");}}/>}
      {modal && modal.mode==="cert"  && <CertModal tut={modal.tut} user={u} compl={compls.find(c=>c.userId===u.id&&c.tutId===modal.tut.id)} onClose={closeModal}/>}
      {modal && modal.mode==="chat"  && <ChatModal tut={modal.tut} onClose={closeModal}/>}
    </div>
  );
}

/* ─── QUIZ MODAL ─────────────────────────────────────────────── */
function QuizModal({ tut, user, onClose, onComplete }) {
  const [qs, setQs]             = useState(null);
  const [answers, setAnswers]   = useState({});
  const [submitted, setSubmit]  = useState(false);
  const [score, setScore]       = useState(0);
  const [loading, setLoading]   = useState(true);

  useEffect(() => {
    (async () => {
      const prompt = `Genera 4 preguntas de opción múltiple en ${tut.lang} sobre el tutorial: "${tut.title}". Responde SOLO con JSON válido sin markdown:\n[{"question":"texto","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0}]\n"correct" es el índice 0-3 de la respuesta correcta.`;
      const r = await ai(prompt);
      try {
        const parsed = JSON.parse(r.replace(/```json|```/g,"").trim());
        setQs(Array.isArray(parsed) ? parsed.slice(0,4) : null);
      } catch {
        setQs([
          {question:`¿Cuál es el primer paso para ${tut.title.toLowerCase()}?`,options:["A) Verificar acceso","B) Saltar pasos","C) Ignorar instrucciones","D) Improvisar"],correct:0},
          {question:"¿Qué hacer antes de finalizar el proceso?",options:["A) Cerrar sin guardar","B) Verificar y guardar los datos","C) Nada especial","D) Llamar a soporte"],correct:1},
          {question:"¿Cuándo se considera completado el proceso?",options:["A) Al abrirlo","B) A la mitad","C) Al completar todos los pasos","D) Nunca"],correct:2},
          {question:"¿Por qué es importante seguir el proceso correctamente?",options:["A) No es importante","B) Mejora eficiencia y reduce errores","C) Solo por cumplir reglas","D) Es opcional"],correct:1},
        ]);
      }
      setLoading(false);
    })();
  }, []);

  const submit = () => {
    if (!qs) return;
    let correct = 0;
    qs.forEach((q,i) => { if (answers[i] === q.correct) correct++; });
    const s = Math.round((correct / qs.length) * 100);
    setScore(s);
    setSubmit(true);
  };

  return (
    <div className="ov" onClick={e => e.target===e.currentTarget && !loading && onClose()}>
      <div className="modal modal-lg">
        <div className="mh">
          <div className="mt">🧠 Quiz — {tut.title}</div>
          {!loading && <button className="ibtn" onClick={onClose}><Ic n="close" s={13}/></button>}
        </div>
        <div className="mb">
          {loading && (
            <div className="aild">
              <div className="aiorb"><span style={{fontSize:22}}>🧠</span></div>
              <div style={{fontWeight:700}}>Generando preguntas con IA...</div>
              <div style={{color:"var(--mut)",fontSize:12}}>Claude crea preguntas específicas para este tutorial</div>
            </div>
          )}
          {!loading && submitted && (
            <div style={{textAlign:"center",padding:"18px 0"}}>
              <div style={{fontSize:56,marginBottom:12}}>{score>=80?"🎉":score>=60?"👍":"💪"}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,marginBottom:7}}>
                Score: <span style={{color:score>=80?"var(--grn)":score>=60?"var(--org)":"var(--red)"}}>{score}%</span>
              </div>
              <div style={{color:"var(--mut)",fontSize:13,marginBottom:18}}>
                {score>=80?"¡Excelente! Podés obtener tu certificado.":score>=60?"Buen trabajo.":"Repasá el tutorial e intentá de nuevo."}
              </div>
              <div className="g2" style={{maxWidth:340,margin:"0 auto 18px"}}>
                {qs && qs.map((q,i) => (
                  <div key={i} style={{padding:"9px 11px",borderRadius:8,background:answers[i]===q.correct?"rgba(16,185,129,.08)":"rgba(239,68,68,.08)",border:`1px solid ${answers[i]===q.correct?"rgba(16,185,129,.22)":"rgba(239,68,68,.22)"}`}}>
                    <div style={{fontSize:10.5,fontWeight:700,color:answers[i]===q.correct?"var(--grn)":"var(--red)"}}>{answers[i]===q.correct?"✓ Correcta":"✗ Incorrecta"}</div>
                    <div style={{fontSize:10.5,marginTop:1,color:"var(--lt)"}}>{q.question.slice(0,55)}…</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
                {score>=60 && tut.certOn && <button className="btn btn-p" onClick={()=>onComplete(score)}><Ic n="cert" s={13}/>Obtener Certificado</button>}
                <button className="btn btn-s" onClick={onClose}>Cerrar</button>
                {score<60 && <button className="btn btn-s" onClick={()=>{setAnswers({});setSubmit(false);}}>Intentar de nuevo</button>}
              </div>
            </div>
          )}
          {!loading && !submitted && qs && (
            <>
              <div style={{marginBottom:14,fontSize:12,color:"var(--mut)"}}>Respondé las {qs.length} preguntas</div>
              {qs.map((q,qi) => (
                <div key={qi} className="qq">
                  <div style={{fontWeight:600,fontSize:13,marginBottom:7}}>{qi+1}. {q.question}</div>
                  {q.options.map((opt,oi) => (
                    <div key={oi} className={`qopt${answers[qi]===oi?" sel":""}`} onClick={()=>setAnswers(p=>({...p,[qi]:oi}))}>
                      <div style={{width:15,height:15,borderRadius:"50%",border:`2px solid ${answers[qi]===oi?"var(--acc)":"var(--bdr)"}`,background:answers[qi]===oi?"var(--acc)":"transparent",flexShrink:0,transition:".13s"}}/>
                      {opt}
                    </div>
                  ))}
                </div>
              ))}
            </>
          )}
        </div>
        {!loading && !submitted && qs && (
          <div className="mf">
            <button className="btn btn-s btn-sm" onClick={onClose}>Cancelar</button>
            <button className="btn btn-p btn-sm" onClick={submit} disabled={Object.keys(answers).length < qs.length}>
              Enviar ({Object.keys(answers).length}/{qs.length})
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── CHAT MODAL ─────────────────────────────────────────────── */
function ChatModal({ tut, onClose }) {
  const [msgs, setMsgs]   = useState([{ role:"bot", text:`¡Hola! Soy tu asistente para "${tut.title}". Preguntame cualquier duda sobre el contenido. ¿En qué te ayudo?` }]);
  const [input, setInput] = useState("");
  const [busy, setBusy]   = useState(false);
  const endRef            = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

  const send = async () => {
    const q = input.trim();
    if (!q || busy) return;
    setInput("");
    setMsgs(p => [...p, { role:"user", text:q }, { role:"bot", text:"●●●", loading:true }]);
    setBusy(true);
    const sys = `Eres un asistente de capacitación conciso. El usuario ve el tutorial: "${tut.title}" (área: ${tut.dept}, idioma: ${tut.lang}). Respondé en ${tut.lang}, máximo 3 párrafos cortos.`;
    const r = await ai(`Pregunta: ${q}`, sys);
    const reply = r || "No pude conectar. Intentá de nuevo.";
    setMsgs(p => [...p.slice(0,-1), { role:"bot", text:reply }]);
    setBusy(false);
  };

  return (
    <div className="ov" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="mh">
          <div><div className="mt">💬 Asistente IA</div><div style={{fontSize:11,color:"var(--mut)",marginTop:1}}>{tut.title}</div></div>
          <button className="ibtn" onClick={onClose}><Ic n="close" s={13}/></button>
        </div>
        <div className="chat-wrap">
          <div className="chat-msgs">
            {msgs.map((m,i) => (
              <div key={i} className={`chat-msg ${m.role}`} style={{opacity:m.loading?0.5:1}}>
                {m.text}
              </div>
            ))}
            <div ref={endRef}/>
          </div>
          <div className="chat-in">
            <input placeholder="Preguntá algo..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
            <button className="btn btn-p btn-sm" onClick={send} disabled={busy||!input.trim()}>Enviar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── NEW TUTORIAL MODAL ─────────────────────────────────────── */
function NewTutModal({ onClose, onSave, plan, isAdmin, allUsers=[] }) {
  const [step, setStep]         = useState(1);
  const [src, setSrc]           = useState("url");
  const [out, setOut]           = useState(isAdmin ? "video" : (plan?.types[0]||"text"));
  const [lang, setLang]         = useState("Español");
  const [url, setUrl]           = useState("");
  const [title, setTitle]       = useState("");
  const [dept, setDept]         = useState("RRHH");
  const [quizOn, setQuizOn]     = useState(true);
  const [certOn, setCertOn]     = useState(true);
  const [assignTo, setAssignTo] = useState([]);
  const [steps, setSteps]       = useState([]);
  const [editMode, setEditMode] = useState(false);
  const [done, setDone]         = useState([]);
  const [loading, setLoading]   = useState(false);

  const maxL    = isAdmin ? 9 : (plan?.langs || 1);
  const availOut = isAdmin ? OUTPUTS : OUTPUTS.filter(o => plan?.types.includes(o.id));

  const aiSteps = ["Analizando fuente...","Extrayendo contenido...","Estructurando pasos...","Traduciendo al "+lang+"...","Aplicando formato "+out+"...","Optimizando...","¡Listo!"];

  const generate = async () => {
    setStep(3); setDone([]); setLoading(true);
    for (let i = 0; i < aiSteps.length-1; i++) {
      await new Promise(r => setTimeout(r, 480 + Math.random()*300));
      setDone(p => [...p, i]);
    }
    const prompt = `Sos experto en capacitación empresarial. Creá un tutorial profesional en ${lang} sobre: "${title||url||"el proceso indicado"}". Área: ${dept}. Formato: ${out==="video"?"video animado":out==="voice"?"narración de audio":"texto estructurado"}.\n\nUsá EXACTAMENTE este formato:\nPASO 1: [título]\n[descripción 2-3 oraciones]\n\nPASO 2: [título]\n[descripción]\n\n(hasta PASO 5)\n\nTIEMPO: X minutos\n\nSolo los pasos, sin intro ni conclusión.`;
    const r = await ai(prompt);
    const raw = r || fallback(title||url, dept);
    const ps  = parseSteps(raw);
    setSteps(ps.length ? ps : [{ num:"1", title:"Proceso completo", body:raw }]);
    setDone(p => [...p, aiSteps.length-1]);
    setLoading(false);
    setStep(4);
  };

  const save = () => {
    const t = {
      id: Date.now(), title:title||url||"Tutorial sin título", type:out, source:src,
      lang, dept, views:0, completions:0, status:"published",
      created:new Date().toISOString().slice(0,10), duration:"~8 min",
      quizOn, certOn, assignedTo:assignTo, steps,
    };
    onSave(t);
  };

  return (
    <div className="ov" onClick={e => e.target===e.currentTarget && step!==3 && onClose()}>
      <div className="modal modal-lg">
        <div className="mh">
          <div className="mt">
            {step===1 && "📥 Fuente del contenido"}
            {step===2 && "⚙️ Configuración"}
            {step===3 && "🤖 Generando con IA..."}
            {step===4 && "✅ Tutorial listo — Editá y publicá"}
          </div>
          {step!==3 && <button className="ibtn" onClick={onClose}><Ic n="close" s={13}/></button>}
        </div>

        <div className="mb">
          {/* PASO 1 */}
          {step===1 && (
            <>
              <div className="fg">
                <label>Fuente de contenido</label>
                <div className="srcg">
                  {SOURCES.map(s => (
                    <div key={s.id} className={`sri${src===s.id?" on":""}`} onClick={() => setSrc(s.id)}>
                      <div style={{fontSize:18,marginBottom:4}}>{s.icon}</div>
                      <div style={{fontSize:10.5,fontWeight:700}}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>
              {src==="url" && <div className="fg"><label>URL o enlace</label><input placeholder="https://..." value={url} onChange={e=>setUrl(e.target.value)}/></div>}
              {(src==="image"||src==="qr"||src==="barcode") && (
                <div className="drop">
                  <div style={{fontSize:22,marginBottom:6}}>{src==="qr"?"◼️":src==="barcode"?"▦":"🖼️"}</div>
                  <div style={{fontWeight:600,fontSize:12.5,marginBottom:3}}>Subir {src==="qr"?"imagen QR":src==="barcode"?"código de barras":"captura"}</div>
                  <button className="btn btn-s btn-sm" style={{marginTop:8}}>Elegir archivo</button>
                </div>
              )}
              {src==="upload" && (
                <div className="drop">
                  <div style={{fontSize:22,marginBottom:6}}>📁</div>
                  <div style={{fontWeight:600,fontSize:12.5,marginBottom:5}}>Archivos de empresa</div>
                  <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap",marginBottom:7}}>{["📄Word","📊Excel","📋PPT","📑PDF","🔷SAP"].map(f=><span key={f} className="tag">{f}</span>)}</div>
                  <button className="btn btn-s btn-sm">Elegir archivo</button>
                </div>
              )}
              {src==="audio" && (
                <div className="drop">
                  <div style={{fontSize:22,marginBottom:6}}>🎤</div>
                  <div style={{fontWeight:600,fontSize:12.5,marginBottom:3}}>Grabación de reunión</div>
                  <div style={{fontSize:11,color:"var(--mut)",marginBottom:8}}>Zoom, Teams, Meet — MP3, MP4</div>
                  <button className="btn btn-s btn-sm">Subir grabación</button>
                </div>
              )}
            </>
          )}

          {/* PASO 2 */}
          {step===2 && (
            <>
              <div className="fg"><label>Título del tutorial</label><input placeholder="Ej: Cómo procesar órdenes en SAP..." value={title} onChange={e=>setTitle(e.target.value)}/></div>
              <div className="g2">
                <div className="fg">
                  <label>Departamento</label>
                  <select value={dept} onChange={e=>setDept(e.target.value)}>
                    {["RRHH","TI","Finanzas","Ventas","Marketing","Operaciones","Legal","Compras","Producción"].map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <div className="fg">
                  <label>Idioma de salida</label>
                  <select value={lang} onChange={e=>setLang(e.target.value)}>
                    {LANGS.slice(0, maxL).map(l=><option key={l}>{l}</option>)}
                  </select>
                </div>
              </div>
              <div className="fg">
                <label>Tipo de salida</label>
                <div className="g3">
                  {availOut.map(o => (
                    <div key={o.id} className={`outi${out===o.id?" on":""}`} onClick={()=>setOut(o.id)}>
                      <span style={{fontSize:20}}>{o.icon}</span>
                      <span style={{fontWeight:700,fontSize:12}}>{o.label}</span>
                    </div>
                  ))}
                  {!isAdmin && plan && !plan.types.includes("video") && (
                    <div className="outi" style={{opacity:.4,cursor:"not-allowed"}}>
                      <span style={{fontSize:20}}>🎬</span>
                      <span style={{fontSize:11,fontWeight:700}}>Video</span>
                      <span style={{fontSize:9.5,color:"var(--org)"}}>Solo Pro+</span>
                    </div>
                  )}
                </div>
              </div>
              <div style={{background:"var(--bg)",border:"1px solid var(--bdr)",borderRadius:9,padding:13,marginBottom:13}}>
                <div style={{fontWeight:700,fontSize:12.5,marginBottom:10}}>⚙️ Opciones</div>
                <div className="togrow" onClick={()=>setQuizOn(p=>!p)}>
                  <div className={`tog ${quizOn?"on":"off"}`}/>
                  <span>Activar quiz al finalizar</span>
                  <span className="bd bp" style={{marginLeft:"auto"}}>🧠 +valor</span>
                </div>
                <div className="togrow" onClick={()=>setCertOn(p=>!p)} style={{marginTop:8}}>
                  <div className={`tog ${certOn?"on":"off"}`}/>
                  <span>Emitir certificado al aprobar</span>
                  <span className="bd bc" style={{marginLeft:"auto"}}>🎓 +valor</span>
                </div>
              </div>
              {allUsers.length > 0 && (
                <div className="fg">
                  <label>Asignar a miembros del equipo</label>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {allUsers.map(u => (
                      <label key={u.id} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",background:"var(--bg)",border:"1px solid var(--bdr)",borderRadius:7,cursor:"pointer"}}>
                        <input type="checkbox" style={{width:"auto"}} checked={assignTo.includes(u.id)} onChange={e=>setAssignTo(p=>e.target.checked?[...p,u.id]:p.filter(x=>x!==u.id))}/>
                        <div className="ava" style={{width:24,height:24,fontSize:9}}>{u.avatar}</div>
                        <span style={{fontSize:12}}>{u.name}</span>
                        <span className="bd bx" style={{marginLeft:"auto"}}>{u.plan}</span>
                      </label>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {/* PASO 3 — AI */}
          {step===3 && (
            <div className="aild">
              <div className="aiorb"><span style={{fontSize:24}}>🤖</span></div>
              <div style={{fontWeight:700,fontSize:15}}>Claude AI generando tu tutorial</div>
              <div style={{width:"100%",maxWidth:370}}>
                {aiSteps.map((s,i) => (
                  <div key={i} className={`aistep${done.includes(i)?" done":done.length===i?" cur":""}`}>
                    {done.includes(i) ? <Ic n="check" s={12}/> : <span style={{width:12,height:12,display:"inline-block",borderRadius:"50%",border:"1.5px solid currentColor"}}/>}
                    {s}
                  </div>
                ))}
              </div>
              <div style={{width:"75%",maxWidth:280}}>
                <div className="pbar-wrap"><div className="pbar-fill" style={{width:`${Math.round((done.length/aiSteps.length)*100)}%`}}/></div>
                <div style={{fontSize:10,color:"var(--mut)",textAlign:"center",marginTop:3}}>{Math.round((done.length/aiSteps.length)*100)}%</div>
              </div>
            </div>
          )}

          {/* PASO 4 — Resultado */}
          {step===4 && steps.length > 0 && (
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13,gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,padding:"8px 12px",background:"rgba(16,185,129,.07)",borderRadius:8,border:"1px solid rgba(16,185,129,.15)",flex:1}}>
                  <Ic n="check" s={13}/><span style={{fontWeight:600,color:"var(--grn)",fontSize:12}}>Generado en {lang} · {out}</span>
                </div>
                <button className="btn btn-s btn-sm" onClick={()=>setEditMode(p=>!p)}><Ic n="edit" s={11}/>{editMode?"Preview":"Editar"}</button>
              </div>
              <div style={{display:"flex",gap:5,marginBottom:13,flexWrap:"wrap"}}>
                {quizOn && <span className="bd bp">🧠 Quiz activado</span>}
                {certOn && <span className="bd bc">🎓 Certificado activado</span>}
                {assignTo.length>0 && <span className="bd bb">👥 Asignado a {assignTo.length} persona{assignTo.length>1?"s":""}</span>}
              </div>
              {steps.map((s,i) => (
                <div key={i} className="step-box">
                  <div className="step-n">Paso {s.num}</div>
                  {editMode ? (
                    <>
                      <input className="step-ti" value={s.title} onChange={e=>setSteps(p=>p.map((x,j)=>j===i?{...x,title:e.target.value}:x))}/>
                      <textarea className="step-bo" value={s.body} onChange={e=>setSteps(p=>p.map((x,j)=>j===i?{...x,body:e.target.value}:x))}/>
                    </>
                  ) : (
                    <>
                      <div style={{fontWeight:700,fontSize:12.5,marginBottom:3}}>{s.title}</div>
                      <div style={{fontSize:12,color:"var(--lt)",lineHeight:1.7}}>{s.body}</div>
                    </>
                  )}
                </div>
              ))}
              {editMode && (
                <button className="btn btn-s btn-sm" style={{marginTop:8}} onClick={()=>setSteps(p=>[...p,{num:String(p.length+1),title:"Nuevo paso",body:"Descripción del paso..."}])}>
                  <Ic n="plus" s={11}/>Agregar paso
                </button>
              )}
            </>
          )}
        </div>

        <div className="mf">
          {step===1 && <><button className="btn btn-s btn-sm" onClick={onClose}>Cancelar</button><button className="btn btn-p btn-sm" onClick={()=>setStep(2)}>Continuar →</button></>}
          {step===2 && <><button className="btn btn-s btn-sm" onClick={()=>setStep(1)}>← Atrás</button><button className="btn btn-p btn-sm" onClick={generate}>🤖 Generar con IA</button></>}
          {step===4 && <><button className="btn btn-s btn-sm" onClick={()=>{setStep(1);setSteps([]);setDone([]);}}>Crear otro</button><button className="btn btn-p btn-sm" onClick={save}><Ic n="check" s={12}/>Publicar</button></>}
        </div>
      </div>
    </div>
  );
}

const reactRoot = ReactDOM.createRoot(container);

  </script>
